---
- name: Install Grafana dependencies
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - software-properties-common
      - wget
      - gpg
    state: present
    update_cache: true

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download Grafana GPG key
  ansible.builtin.shell: |
    wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor > /etc/apt/keyrings/grafana.gpg
  args:
    creates: /etc/apt/keyrings/grafana.gpg

- name: Set Grafana GPG key permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/grafana.gpg
    owner: root
    group: root
    mode: "0644"

- name: Add Grafana apt repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/grafana.list
    owner: root
    group: root
    mode: "0644"
    content: |
      deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main

- name: Install Grafana
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: true

- name: Create Grafana provisioning datasource directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/datasources
    state: directory
    owner: root
    group: grafana
    mode: "0755"

- name: Provision Prometheus datasource
  ansible.builtin.copy:
    src: datasources/prometheus.yml
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: root
    group: grafana
    mode: "0644"
  notify: Restart Grafana

- name: Create Grafana dashboards directory
  ansible.builtin.file:
    path: /var/lib/grafana/dashboards
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"

- name: Create Grafana dashboard provisioning directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    owner: root
    group: grafana
    mode: "0755"

- name: Copy Node Exporter dashboard
  ansible.builtin.copy:
    src: dashboards/node-exporter-full.json
    dest: /var/lib/grafana/dashboards/node-exporter-full.json
    owner: grafana
    group: grafana
    mode: "0644"
  notify: Restart Grafana

- name: Provision Grafana dashboards
  ansible.builtin.copy:
    src: provisioning/dashboards/node-exporter.yml
    dest: /etc/grafana/provisioning/dashboards/node-exporter.yml
    owner: root
    group: grafana
    mode: "0644"
  notify: Restart Grafana

- name: Ensure Grafana is enabled and running
  ansible.builtin.service:
    name: grafana-server
    state: started
    enabled: true
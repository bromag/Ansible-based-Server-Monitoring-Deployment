---
- name: Install Python packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: true

- name: Create application Linux group
  ansible.builtin.group:
    name: "{{ app_group }}"
    state: present

- name: Create application Linux user
  ansible.builtin.user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: false

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0755"

- name: Copy Flask app
  ansible.builtin.copy:
    src: app.py
    dest: "{{ app_dir }}/app.py"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  notify: Restart python app

- name: Copy requirements.txt
  ansible.builtin.copy:
    src: requirements.txt
    dest: "{{ app_dir }}/requirements.txt"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
  notify: Restart python app

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv "{{ app_dir }}/venv"
    creates: "{{ app_dir }}/venv/bin/activate"

- name: Install Python dependencies in venv
  ansible.builtin.pip:
    requirements: "{{ app_dir }}/requirements.txt"
    virtualenv: "{{ app_dir }}/venv"

- name: Set ownership for application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    recurse: true

- name: Deploy systemd service
  ansible.builtin.template:
    src: python-app.service.j2
    dest: /etc/systemd/system/python-app.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart python app

- name: Ensure python app is enabled and running
  ansible.builtin.service:
    name: python-app
    state: started
    enabled: true
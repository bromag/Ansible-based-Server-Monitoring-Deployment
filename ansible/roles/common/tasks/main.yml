---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - htop
      - net-tools
      - ca-certificates
      - gnupg
      - lsb-release
      - software-properties-common
    state: present